<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;width:100%;max-width:100%;height:auto">
  <!-- Orchestrator container -->
  <rect x="2" y="2" width="716" height="416" rx="12" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="360" y="32" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">Orchestrator (main thread)</text>
  <!-- Tool Catalog -->
  <rect x="24" y="52" width="220" height="72" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="134" y="78" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Tool Catalog</text>
  <text x="134" y="100" text-anchor="middle" fill="#8b949e" font-size="11">bash, read, glob, grep</text>
  <text x="134" y="116" text-anchor="middle" fill="#8b949e" font-size="11">MCP servers</text>
  <!-- Agent Providers -->
  <rect x="264" y="52" width="220" height="72" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="374" y="78" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Agent Providers</text>
  <text x="374" y="100" text-anchor="middle" fill="#8b949e" font-size="11">Claude, GPT, Ollama</text>
  <text x="374" y="116" text-anchor="middle" fill="#8b949e" font-size="11">per-step model selection</text>
  <!-- GoatDB -->
  <rect x="504" y="52" width="192" height="72" rx="8" fill="#161b22" stroke="#da8ee7" stroke-width="1.5"/>
  <text x="600" y="78" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">GoatDB</text>
  <text x="600" y="100" text-anchor="middle" fill="#8b949e" font-size="11">state, audit trail</text>
  <text x="600" y="116" text-anchor="middle" fill="#8b949e" font-size="11">ratings, history</text>
  <!-- Message passing arrows -->
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3fb950"/></marker>
  </defs>
  <line x1="360" y1="140" x2="360" y2="165" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#ah)"/>
  <text x="420" y="158" fill="#3fb950" font-size="10">message passing</text>
  <!-- Sandbox zone -->
  <rect x="24" y="172" width="672" height="232" rx="10" fill="rgba(218,142,231,0.06)" stroke="#da8ee7" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="360" y="196" text-anchor="middle" fill="#da8ee7" font-size="13" font-weight="bold">Sandboxed V8 Workers — permissions: "none"</text>
  <!-- Protocol 1 -->
  <rect x="44" y="212" width="200" height="172" rx="8" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="144" y="238" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Protocol Isolate 1</text>
  <line x1="64" y1="248" x2="224" y2="248" stroke="#21262d" stroke-width="1"/>
  <g fill="#f85149" font-size="11">
    <circle cx="68" cy="270" r="4"/><text x="80" y="274" fill="#8b949e">No filesystem</text>
    <circle cx="68" cy="296" r="4"/><text x="80" y="300" fill="#8b949e">No network</text>
    <circle cx="68" cy="322" r="4"/><text x="80" y="326" fill="#8b949e">No env access</text>
  </g>
  <text x="144" y="364" text-anchor="middle" fill="#58a6ff" font-size="10">TypeScript (SWC compiled)</text>
  <!-- Protocol 2 -->
  <rect x="264" y="212" width="200" height="172" rx="8" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="364" y="238" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Protocol Isolate 2</text>
  <line x1="284" y1="248" x2="444" y2="248" stroke="#21262d" stroke-width="1"/>
  <g fill="#f85149" font-size="11">
    <circle cx="288" cy="270" r="4"/><text x="300" y="274" fill="#8b949e">No filesystem</text>
    <circle cx="288" cy="296" r="4"/><text x="300" y="300" fill="#8b949e">No network</text>
    <circle cx="288" cy="322" r="4"/><text x="300" y="326" fill="#8b949e">No env access</text>
  </g>
  <text x="364" y="364" text-anchor="middle" fill="#58a6ff" font-size="10">TypeScript (SWC compiled)</text>
  <!-- Protocol N -->
  <rect x="484" y="212" width="200" height="172" rx="8" fill="#0d1117" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="584" y="238" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Protocol Isolate N</text>
  <line x1="504" y1="248" x2="664" y2="248" stroke="#21262d" stroke-width="1"/>
  <text x="584" y="300" text-anchor="middle" fill="#8b949e" font-size="24">...</text>
  <text x="584" y="340" text-anchor="middle" fill="#8b949e" font-size="11">crash-isolated</text>
  <text x="584" y="364" text-anchor="middle" fill="#58a6ff" font-size="10">independent lifecycle</text>
</svg>
